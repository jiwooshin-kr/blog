<script>
/* Prev/next + related posts, built from the home listing.
   Runs on every post page; new posts are picked up automatically. */
(async () => {
  const offsetMeta = document.querySelector('meta[name="quarto:offset"]');
  if (!offsetMeta) return;
  const indexUrl = new URL(offsetMeta.content + "index.html", window.location.href);

  let doc;
  try {
    const res = await fetch(indexUrl.href);
    if (!res.ok) return;
    doc = new DOMParser().parseFromString(await res.text(), "text/html");
  } catch (e) {
    return;
  }

  const norm = (p) => p.replace(/index\.html$/, "");
  const here = norm(window.location.pathname);

  // listing is already sorted date-desc
  const items = [...doc.querySelectorAll(".quarto-listing-default .quarto-post")]
    .map((el) => {
      const a = el.querySelector(".listing-title a");
      if (!a) return null;
      const url = new URL(a.getAttribute("href"), indexUrl);
      let cats = [];
      try {
        cats = decodeURIComponent(atob(el.dataset.categories || "")).split(",").filter(Boolean);
      } catch (e) {}
      const img = el.querySelector(".thumbnail-image");
      const dateEl = el.querySelector(".listing-date");
      return {
        href: url.href,
        path: norm(url.pathname),
        title: a.textContent.trim(),
        date: dateEl ? dateEl.textContent.trim() : "",
        image: img ? new URL(img.getAttribute("src"), indexUrl).href : null,
        cats: cats,
      };
    })
    .filter(Boolean);

  const idx = items.findIndex((it) => it.path === here);
  if (idx === -1 || items.length < 2) return;
  const current = items[idx];
  const newer = idx > 0 ? items[idx - 1] : null;
  const older = idx < items.length - 1 ? items[idx + 1] : null;

  // related: most shared categories first; ties keep date order
  const related = items
    .filter((_, i) => i !== idx)
    .map((it) => ({ it, s: it.cats.filter((c) => current.cats.includes(c)).length }))
    .sort((a, b) => b.s - a.s)
    .slice(0, 3)
    .map((x) => x.it);

  const esc = (s) =>
    s.replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

  const navItem = (post, cls, label) =>
    post
      ? `<a class="post-nav-item ${cls}" href="${post.href}">
           <span class="post-nav-label">${label}</span>
           <span class="post-nav-title">${esc(post.title)}</span>
         </a>`
      : `<span></span>`;

  const wrap = document.createElement("div");
  wrap.className = "post-footer-nav";
  wrap.innerHTML = `
    <nav class="post-nav">
      ${navItem(older, "post-nav-prev", "&larr; Older")}
      ${navItem(newer, "post-nav-next", "Newer &rarr;")}
    </nav>
    ${
      related.length
        ? `<section class="related-posts">
             <div class="related-posts-title">Related posts</div>
             <div class="related-posts-grid">
               ${related
                 .map(
                   (r) => `
                 <a class="related-card" href="${r.href}">
                   ${r.image ? `<img class="related-card-image" src="${r.image}" alt="">` : ""}
                   <span class="related-card-title">${esc(r.title)}</span>
                   <span class="related-card-date">${esc(r.date)}</span>
                 </a>`
                 )
                 .join("")}
             </div>
           </section>`
        : ""
    }
  `;

  const main = document.getElementById("quarto-document-content");
  if (main) main.appendChild(wrap);
})();
</script>
