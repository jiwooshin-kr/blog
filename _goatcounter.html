<script>
/* GoatCounter: visitor tracking + footer counter (Total / Today / Yesterday).
   Setup: sign up at goatcounter.com, then put your site code below.
   Also enable "Allow adding visitor counts on your website" in
   GoatCounter Settings so the counter API is publicly readable. */
(function () {
  var GC_CODE = "jiwooshin";
  if (GC_CODE.indexOf("GOATCOUNTER") === 0) return; // not configured yet
  var site = "https://" + GC_CODE + ".goatcounter.com";

  // tracking snippet
  var s = document.createElement("script");
  s.async = true;
  s.src = "https://gc.zgo.at/count.js";
  s.setAttribute("data-goatcounter", site + "/count");
  document.head.appendChild(s);

  // footer counter: runs after the DOM is ready (this script is injected
  // before the footer markup exists)
  var run = function () {
    var footer = document.querySelector(".nav-footer");
    if (!footer) return;
    var slot = footer.querySelector(".nav-footer-right");
    if (!slot) {
      slot = document.createElement("div");
      slot.className = "nav-footer-right";
      footer.appendChild(slot);
    }
    var el = document.createElement("span");
    el.className = "visitor-stats";
    slot.appendChild(el);
    var d2s = function (d) {
      var p = function (n) { return String(n).padStart(2, "0"); };
      return d.getFullYear() + "-" + p(d.getMonth() + 1) + "-" + p(d.getDate());
    };
    var now = new Date();
    var today = d2s(now);
    var yest = d2s(new Date(now.getTime() - 864e5));
    // GoatCounter caches counter responses for hours, and only recognized
    // params (start/end) form the cache key. Rotating an ancient start date
    // by hour gives fresh numbers (max ~1h stale) while sharing the cache
    // within each hour. Note: "end" excludes that day, hence the subtraction.
    var ancient = "2020-01-" + String(now.getHours() + 1).padStart(2, "0");
    var get = function (qs) {
      return fetch(site + "/counter/TOTAL.json" + qs)
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (j) {
          if (!j) return null;
          // unique visitors (sessions), not raw pageviews
          var n = j.count_unique != null ? j.count_unique : j.count;
          return parseInt(String(n).replace(/[^0-9]/g, ""), 10);
        })
        .catch(function () { return null; });
    };
    Promise.all([
      get("?start=" + ancient),                      // all-time
      get("?start=" + ancient + "&end=" + today),    // before today
      get("?start=" + ancient + "&end=" + yest),     // before yesterday
    ]).then(function (v) {
      var total = v[0], beforeToday = v[1], beforeYest = v[2];
      if (total == null || isNaN(total)) return;
      var fmt = function (n) { return n == null || isNaN(n) || n < 0 ? "0" : String(n); };
      var todayN = beforeToday == null ? null : total - beforeToday;
      var yestN = beforeToday == null || beforeYest == null ? null : beforeToday - beforeYest;
      el.textContent =
        "Total " + total + " · Today " + fmt(todayN) + " · Yesterday " + fmt(yestN);
    });
  };
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", run);
  } else {
    run();
  }
})();
</script>
